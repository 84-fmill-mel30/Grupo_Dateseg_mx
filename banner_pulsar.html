<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSAR DX — Banner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
/* lienzo cuadrado 1080x1080 para Facebook post */
.stage{position:relative;width:1080px;height:1080px;background:radial-gradient(ellipse 80% 70% at 50% 35%,#102a4d,#060d18 70%);overflow:hidden}
.stage::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(47,111,214,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(47,111,214,.07) 1px,transparent 1px);
  background-size:54px 54px;mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,#000,transparent)}

/* pulso de fondo decorativo */
.bgpulse{position:absolute;top:50%;left:-10%;width:120%;height:3px;opacity:.25;
  background:linear-gradient(90deg,transparent,#16d97f,transparent)}

/* ESCENA 1: dolor (preguntas que rotan) */
.dolor{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
.dolor .q{position:absolute;color:#fff;font-size:74px;font-weight:800;line-height:1.2;opacity:0;letter-spacing:-.02em;text-shadow:0 4px 30px rgba(0,0,0,.6)}
.dolor .q b{color:#f5a524}
.q1{animation:qshow 0s .3s forwards, qhide 0s 2.3s forwards}
.q2{animation:qshow 0s 2.6s forwards, qhide 0s 4.6s forwards}
.q3{animation:qshow 0s 4.9s forwards, qhide 0s 6.9s forwards}
@keyframes qshow{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0);animation-timing-function:cubic-bezier(.2,.9,.3,1)}}
@keyframes qhide{to{opacity:0;transform:translateY(-24px)}}
.q1{transition:.6s}.q2{transition:.6s}.q3{transition:.6s}

/* truco: usar animaciones con keyframes suaves */
.qA{animation:appear 2.3s .3s both}
.qB{animation:appear 2.3s 2.6s both}
.qC{animation:appear 2.3s 4.9s both}
@keyframes appear{0%{opacity:0;transform:translateY(40px) scale(.96)}12%{opacity:1;transform:translateY(0) scale(1)}80%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}

/* ESCENA 2: presentación producto */
.reveal{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;
  animation:revealIn 1s 7.3s both}
@keyframes revealIn{from{opacity:0}to{opacity:1}}
.intro{color:#9fc3ff;font-size:40px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:0;animation:fadeUp .8s 7.5s both}
.icon{width:300px;height:300px;margin:30px 0;opacity:0;filter:drop-shadow(0 20px 50px rgba(22,217,127,.35));
  animation:popIcon 1.1s 8s cubic-bezier(.2,1.3,.4,1) both}
@keyframes popIcon{0%{opacity:0;transform:scale(.3) rotate(-12deg)}60%{opacity:1;transform:scale(1.08) rotate(3deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.brand{font-size:120px;font-weight:900;letter-spacing:-.03em;opacity:0;animation:fadeUp .9s 8.7s both}
.brand .p{color:#fff}.brand .dx{color:#16d97f}
.slogan{color:#dfe9f7;font-size:42px;font-weight:600;margin-top:18px;opacity:0;animation:fadeUp .9s 9.4s both;text-align:center;max-width:760px;line-height:1.35}
.slogan .hl{color:#f5a524;font-weight:800}
.cta{margin-top:46px;background:#16d97f;color:#06210f;font-size:38px;font-weight:800;padding:24px 58px;border-radius:60px;opacity:0;
  animation:fadeUp .9s 10s both, pulse 2s 10.8s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(22,217,127,.5)}50%{box-shadow:0 0 0 26px rgba(22,217,127,0)}}

/* bandera + marca esquina */
.foot{position:absolute;bottom:46px;left:0;right:0;text-align:center;color:#7d93b5;font-size:30px;font-weight:600;opacity:0;animation:fadeUp 1s 10.2s both}
.foot .flag{display:inline-flex;width:34px;height:22px;border-radius:3px;overflow:hidden;vertical-align:middle;margin-right:8px;box-shadow:0 0 0 1px rgba(255,255,255,.2)}
.foot .flag i{flex:1}.foot .flag i:nth-child(1){background:#006847}.foot .flag i:nth-child(2){background:#fff}.foot .flag i:nth-child(3){background:#ce1126}
</style>
</head>

  <div class="dolor">

    <div class="q qC">¿Aún diagnosticas<br><b>adivinando</b>?</div>
